general {
    lock_cmd = pidof hyprlock || hyprlock     # Avoid starting multiple hyprlock instances
    before_sleep_cmd = loginctl lock-session  # lock before suspend
    after_sleep_cmd = hyprctl dispatch 'hl.dsp.dpms({action = "enable"})'  # to avoid having to press a key twice to turn on the display
    inhibit_sleep = 3  # wait until screen is locked
}

listener {
    timeout = 150                         # 2.5min
    on-timeout = brightnessctl -s set 10  # set monitor backlight to minimum, avoid 0 on oled monitor
    on-resume = brightnessctl -r          # monitor backlight restore
}

# Turn off keyboard backlight
# For some reason, the keyboard dimming makes the display not come back
listener {
    timeout = 150                                           # 2.5min
    on-timeout = brightnessctl -sd chromeos::kbd_backlight set 0  # turn off keyboard backlight
    on-resume = brightnessctl -rd chromeos::kbd_backlight         # turn on keyboard backlight
}

listener {
    timeout = 300                       # 5min
    on-timeout = loginctl lock-session  # lock session when timeout passed
}

# Turn off monitor(s)
listener {
    timeout = 330                                                                         # 5.5min
    on-timeout = hyprctl dispatch 'hl.dsp.dpms({action = "disable" })'                    # screen off
    on-resume = hyprctl dispatch 'hl.dsp.dpms({action = "enable"})' && brightnessctl -r  # screen on and screen brightness restored
}

